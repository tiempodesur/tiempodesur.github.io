<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
div.scrollmenu {
  background-color: #333;
  overflow: auto;
  white-space: nowrap;
}

div.scrollmenu a {
  display: inline-block;
  color: white;
  text-align: center;
  padding: 14px;
  text-decoration: none;
}

div.scrollmenu a:hover {
  background-color: #777;
}


* {
  box-sizing: border-box;
}

.row {
  display: flex;
}

/* Create three equal columns that sits next to each other */
.column {
  flex: 33.33%;
  padding: 5px;
}



</style>
</head>
<body>



<div class="scrollmenu">
  <p style="color:white">
  <img src="Lluvia.jpg" alt="Lluvia" width="500">
  <img src="Snow.jpg" alt="Lluvia" width="500">
  <img src="Lluvia.jpg" alt="Lluvia" width="500">
  <img src="Snow.jpg" alt="Lluvia" width="500">
  </p>
</div>


<div class="row">
  <div class="column">
    <img src="Lluvia.jpg" alt="Snow" style="width:100%">
  </div>
  <div class="column">
    <img src="Snow.jpg" alt="Forest" style="width:100%">
  </div>
  <div class="column">
    <img src="Lluvia.jpg" alt="Mountains" style="width:100%">
  </div>
</div>


</body>
</html>
